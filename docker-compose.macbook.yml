# MusicSpace MacBook 배포용 Docker Compose (Docker Hub Pull 방식)
# 도메인: http://imapplepie20.tplinkdns.com
# 방식: Docker Hub 이미지 Pull + HTTP (SSL 없음)
# 사용법: docker compose -f docker-compose.macbook.yml pull && docker compose -f docker-compose.macbook.yml up -d

services:
  # MariaDB 데이터베이스
  db:
    image: mariadb:10.11
    container_name: musicspace-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-musicspace123}
      MARIADB_DATABASE: ${DB_NAME:-music_space_db}
      MARIADB_USER: ${DB_USER:-musicspace}
      MARIADB_PASSWORD: ${DB_PASSWORD:-musicspace123}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docs/dbSchema.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - musicspace-network

  # Redis (JWT refresh tokens)
  redis:
    image: redis:7-alpine
    container_name: musicspace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - musicspace-network

  # Spring Boot 백엔드 (Docker Hub)
  spring-backend:
    image: johae201/music_space_place:spring-backend
    container_name: musicspace-spring-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-musicspace}
      DB_PASSWORD: ${DB_PASSWORD:-musicspace123}
      DB_NAME: ${DB_NAME:-music_space_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-MusicSpaceSecretKeyForJWTAuthentication2024VeryLongKeyHereNeedAtLeast256BitsForHS256Algorithm}
      SERVER_PORT: 8080
      TIDAL_CLIENT_ID: ${TIDAL_CLIENT_ID:-}
      TIDAL_CLIENT_SECRET: ${TIDAL_CLIENT_SECRET:-}
      TIDAL_REDIRECT_URI: ${TIDAL_REDIRECT_URI:-http://imapplepie20.tplinkdns.com/tidal-callback}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      YOUTUBE_KEY: ${YOUTUBE_KEY:-}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      FASTAPI_URL: http://fastapi:8000
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/uploads
    networks:
      - musicspace-network

  # FastAPI AI/ML 서버 (Docker Hub)
  fastapi:
    image: johae201/music_space_place:fastapi
    container_name: musicspace-fastapi
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      PORT: 8000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-musicspace}
      DB_PASSWORD: ${DB_PASSWORD:-musicspace123}
      DB_NAME: ${DB_NAME:-music_space_db}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - fastapi_models:/app/M1/user_models
      - fastapi_llm:/app/LLM
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - musicspace-network

  # Node.js 백엔드 (Docker Hub)
  backend:
    image: johae201/music_space_place:node-backend
    container_name: musicspace-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-musicspace}
      DB_PASSWORD: ${DB_PASSWORD:-musicspace123}
      DB_NAME: ${DB_NAME:-music_space_db}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_me}
      TIDAL_CLIENT_ID: ${TIDAL_CLIENT_ID:-}
      TIDAL_CLIENT_SECRET: ${TIDAL_CLIENT_SECRET:-}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      YOUTUBE_KEY: ${YOUTUBE_KEY:-}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      LASTFM_API_KEY: ${LASTFM_API_KEY:-}
      IMAGES_PATH: /app/public/images
    expose:
      - "3001"
    volumes:
      - ./public/images:/app/public/images
    depends_on:
      db:
        condition: service_healthy
    networks:
      - musicspace-network

  # React 프론트엔드 (Docker Hub) + HTTP nginx (nginx.local.conf 마운트)
  frontend:
    image: johae201/music_space_place:frontend
    container_name: musicspace-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    depends_on:
      - spring-backend
      - fastapi
      - backend
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
      - ./public/images:/usr/share/nginx/html/images
      - ./public/uploads:/usr/share/nginx/html/uploads
      - ./public/webroot:/webroot
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - musicspace-network

volumes:
  mariadb_data:
  redis_data:
  fastapi_models:
  fastapi_llm:

networks:
  musicspace-network:
    driver: bridge
