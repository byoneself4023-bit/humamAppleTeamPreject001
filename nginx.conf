        # Apple Music API Proxy (for CORS bypass)
        location /apple-proxy/ {
            proxy_pass https://amp-api-edge.music.apple.com/v1;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_set_header Host amp-api-edge.music.apple.com;
            proxy_set_header Origin https://music.apple.com;
            proxy_set_header Referer https://music.apple.com/;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept-Language";
        }

        # Node.js API (플레이리스트, 음악 관련 - 기존 유지)
        location /api/ {
            proxy_pass http://node_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Origin $http_origin;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }

        # 이미지 프록시 (Node.js) - DISABLED: Serving statically via Nginx
